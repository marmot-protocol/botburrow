ping:
  bot: relay_bot
  name: Ping
  pattern: /ping
  pattern_type: 0
  response_text: pong!
  position: 1
  enabled: true

help:
  bot: relay_bot
  name: Help
  pattern: /help
  pattern_type: 0
  response_text: "Available commands: /ping, /help"
  position: 2
  enabled: true

disabled_command:
  bot: relay_bot
  name: Secret
  pattern: /secret
  pattern_type: 0
  response_text: "You found a secret!"
  position: 3
  enabled: false

exact_greeting:
  bot: echo_bot
  name: Greeting
  pattern: hello
  pattern_type: 1
  response_text: "Hello there!"
  position: 1
  enabled: true

