keyword_trigger:
  bot: relay_bot
  name: Welcome keyword
  event_type: 0
  condition_type: 0
  condition_value: hello
  action_type: 0
  action_config: '{"response_text": "Welcome to the group!"}'
  position: 1
  enabled: true

regex_trigger:
  bot: relay_bot
  name: Bug report regex
  event_type: 0
  condition_type: 1
  condition_value: 'bug\s*#?\d+'
  action_type: 0
  action_config: '{"response_text": "Bug report noted."}'
  position: 2
  enabled: true

any_trigger:
  bot: relay_bot
  name: Catch all
  event_type: 0
  condition_type: 2
  condition_value:
  action_type: 2
  position: 3
  enabled: true

disabled_trigger:
  bot: relay_bot
  name: Disabled trigger
  event_type: 0
  condition_type: 0
  condition_value: secret
  action_type: 0
  action_config: '{"response_text": "You found a secret!"}'
  position: 4
  enabled: false

echo_trigger:
  bot: echo_bot
  name: Echo greeting
  event_type: 0
  condition_type: 0
  condition_value: hi
  action_type: 0
  action_config: '{"response_text": "Hi there!"}'
  position: 1
  enabled: true

