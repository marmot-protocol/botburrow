keyword_trigger:
  bot: relay_bot
  name: Welcome keyword

  condition_type: 0
  condition_value: hello
  script_body: '"Welcome to the group!"'
  position: 1
  enabled: true

regex_trigger:
  bot: relay_bot
  name: Bug report regex

  condition_type: 1
  condition_value: 'bug\s*#?\d+'
  script_body: '"Bug report noted."'
  position: 2
  enabled: true

any_trigger:
  bot: relay_bot
  name: Catch all

  condition_type: 2
  condition_value:
  script_body: 'nil'
  position: 3
  enabled: true

disabled_trigger:
  bot: relay_bot
  name: Disabled trigger

  condition_type: 0
  condition_value: secret
  script_body: '"You found a secret!"'
  position: 4
  enabled: false

echo_trigger:
  bot: echo_bot
  name: Echo greeting

  condition_type: 0
  condition_value: hi
  script_body: '"Hi there!"'
  position: 1
  enabled: true

