hourly_greeting:
  bot: echo_bot
  name: Hourly greeting
  schedule: "0 * * * *"
  group_ids: '["testgroup1"]'
  script_body: '"Good morning!"'
  enabled: true
  last_run_at: <%= 2.hours.ago.to_fs(:db) %>
  next_run_at: <%= 1.hour.ago.to_fs(:db) %>

daily_report:
  bot: relay_bot
  name: Daily report
  schedule: "0 0 * * *"
  group_ids: '["testgroup2"]'
  script_body: '"Daily report summary"'
  enabled: true
  last_run_at:
  next_run_at: <%= 1.day.from_now.to_fs(:db) %>

disabled_action:
  bot: relay_bot
  name: Disabled action
  schedule: "*/30 * * * *"
  group_ids: '["testgroup3"]'
  script_body: '"Should not fire"'
  enabled: false
  last_run_at:
  next_run_at: <%= 1.hour.ago.to_fs(:db) %>

