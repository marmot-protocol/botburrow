hourly_greeting:
  bot: echo_bot
  name: Hourly greeting
  schedule: "every 1h"
  action_type: 0
  action_config: '{"group_id": "testgroup1", "message": "Good morning!"}'
  enabled: true
  last_run_at: <%= 2.hours.ago.to_fs(:db) %>
  next_run_at: <%= 1.hour.ago.to_fs(:db) %>

daily_report:
  bot: relay_bot
  name: Daily report
  schedule: "every 1d"
  action_type: 0
  action_config: '{"group_id": "testgroup2", "message": "Daily report summary"}'
  enabled: true
  last_run_at:
  next_run_at: <%= 1.day.from_now.to_fs(:db) %>

disabled_action:
  bot: relay_bot
  name: Disabled action
  schedule: "every 30m"
  action_type: 0
  action_config: '{"group_id": "testgroup3", "message": "Should not fire"}'
  enabled: false
  last_run_at:
  next_run_at: <%= 1.hour.ago.to_fs(:db) %>

