# Solid Cable uses the database for cross-process pub/sub. Required because the
# BotListener runs in a separate process from the web server and broadcasts
# status changes that must reach the browser via ActionCable.
development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.hour

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
